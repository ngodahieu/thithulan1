<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thông Tin Thí Sinh</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .card{
      padding:35px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
    }

    h2{
      margin-bottom:25px;
      font-size:30px;
    }

    .info{
      background:rgba(255,255,255,0.06);
      padding:15px;
      border-radius:18px;
      margin-top:15px;
      display:flex;
      justify-content:space-between;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      margin-top:20px;
    }

    .buttons{
      display:flex;
      gap:15px;
      margin-top:25px;
    }

    button{
      flex:1;
      padding:15px;
      border:none;
      border-radius:18px;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    .back{
      background:rgba(255,255,255,0.08);
    }

    .next{
      background:linear-gradient(135deg,#10b981,#34d399);
    }

    @media(max-width:768px){

      .container{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="card">

      <h2>Thông Tin Kỳ Thi</h2>

      <div class="info">
        <span>Kỳ thi</span>
        <strong>Kiểm Tra Học Kỳ II</strong>
      </div>

      <div class="info">
        <span>Môn thi</span>
        <strong>Toán Học</strong>
      </div>

      <div class="info">
        <span>Thời gian</span>
        <strong>60 phút</strong>
      </div>

      <div class="info">
        <span>Mã dự thi</span>
        <strong id="showCode"></strong>
      </div>

    </div>


    <div class="card">

      <h2>Thông Tin Thí Sinh</h2>

      <input type="text" id="studentName" placeholder="Nhập họ và tên">

      <div class="buttons">

        <button class="back" onclick="goBack()">
          Quay Lại
        </button>

        <button class="next" onclick="goExam()">
          Vào Làm Bài
        </button>

      </div>

    </div>

  </div>

  <script>

    let code=localStorage.getItem('examCode');

    document.getElementById('showCode').innerText=code;

    function goBack(){
      window.location.href='index.html';
    }

    function goExam(){

      let name=document.getElementById('studentName').value;

      if(name.trim()===''){
        alert('Vui lòng nhập họ tên');
        return;
      }

      localStorage.setItem('studentName',name);

      window.location.href='exam.html';
    }

  </script>

</body>
</html>
