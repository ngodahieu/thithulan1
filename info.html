<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thông Tin Thí Sinh</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
      radial-gradient(circle at top left,#2563eb55,transparent 30%),
      radial-gradient(circle at bottom right,#10b98155,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#111827);
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .card{
      padding:35px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
    }

    h2{
      margin-bottom:25px;
      font-size:30px;
    }

    .info{
      padding:15px;
      border-radius:18px;
      background:rgba(255,255,255,0.06);
      margin-top:15px;
      display:flex;
      justify-content:space-between;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#10b981,#34d399);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    @media(max-width:768px){

      .container{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="card">

      <h2>Thông Tin Kỳ Thi</h2>

      <div class="info">
        <span>Kỳ thi</span>
        <strong>THPTQG LẦN II</strong>
      </div>

      <div class="info">
        <span>Môn thi</span>
        <strong>Hóa Học</strong>
      </div>

      <div class="info">
        <span>Thời gian</span>
        <strong>50 phút</strong>
      </div>

    </div>


    <div class="card">

      <h2>Thông Tin Thí Sinh</h2>

      <div class="info">
        <span>Họ và tên</span>
        <strong id="studentName"></strong>
      </div>

      <div class="info">
        <span>Mã dự thi</span>
        <strong id="examCode"></strong>
      </div>

      <button onclick="goExam()">
        Vào Làm Bài
      </button>

    </div>

  </div>

  <script>

    let name=localStorage.getItem('studentName');
    let code=localStorage.getItem('examCode');

    document.getElementById('studentName')
    .innerText=name;

    document.getElementById('examCode')
    .innerText=code;

    function goExam(){

      window.location.href='exam.html';

    }

  </script>

</body>
</html>
