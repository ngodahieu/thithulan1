<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0f172a;
padding:30px;
color:white;
}

.container{
max-width:1500px;
margin:auto;
}

.title{
font-size:45px;
font-weight:800;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:25px;
align-items:start;
}

.panel{
background:#111827;
border:1px solid #1e293b;
border-radius:30px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.panel-title{
font-size:24px;
font-weight:700;
margin-bottom:20px;
}

.student-card{
background:#1e293b;
padding:18px;
border-radius:22px;
margin-bottom:18px;
cursor:pointer;
transition:.25s;
}

.student-card:hover{
transform:translateY(-3px);
background:#334155;
}
