<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>XEM BÀI THI</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0f172a;
padding:30px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

.title{
font-size:40px;
font-weight:800;
margin-bottom:25px;
}

.info{
background:#111827;
padding:25px;
border-radius:25px;
margin-bottom:25px;
border:1px solid #1e293b;
}

.question{
background:#111827;
padding:25px;
border-radius:25px;
margin-bottom:20px;
border:1px solid #1e293b;
line-height:1.8;
}

.correct{
color:#22c55e;
font-weight:700;
}

.wrong{
color:#ef4444;
font-weight:700;
}

.answer{
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<div class="title">
XEM CHI TIẾT BÀI THI
</div>

<div id="content"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBw_La4PFQ-RSIxHQxSC98Il934VwbhiV4",

  authDomain: "examsystem-a830e.firebaseapp.com",

  projectId: "examsystem-a830e",

  storageBucket: "examsystem-a830e.firebasestorage.app",

  messagingSenderId: "455003412123",

  appId: "1:455003412123:web:90d879b919cc4f20a3d83e",

  measurementId: "G-6C44HBBE0E"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

async function loadResult(){

const snap =
await getDoc(
doc(db,"results",id)
);

if(!snap.exists()){

document.getElementById(
"content"
).innerHTML =
"<h2>Không tìm thấy bài thi</h2>";

return;

}

const data = snap.data();

let html = `

<div class="info">

<h2>
${data.studentName}
</h2>

<br>

<div>
Mã đề: ${data.examCode}
</div>

<div>
Điểm: ${data.score}/10
</div>

<div>
Nộp lúc: ${data.submitTime}
</div>

</div>

`;

html += data.results.map((r,index)=>`

<div class="question">

<div>
<b>Câu ${index+1}:</b>
${r.question}
</div>

<div class="answer">
Đã chọn:
<b>${r.selected}</b>
</div>

<div class="answer">
Đáp án đúng:
<b>${r.correct}</b>
</div>

<div class="answer">

${
r.status
? '<span class="correct">✓ ĐÚNG</span>'
: '<span class="wrong">✗ SAI</span>'
}

</div>

</div>

`).join("");

document.getElementById(
"content"
).innerHTML = html;

}

loadResult();

</script>

</body>
</html>
