<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thi Online</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
      radial-gradient(circle at top left,#2563eb55,transparent 30%),
      radial-gradient(circle at bottom right,#10b98155,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#111827);
    }

    .card{
      width:100%;
      max-width:520px;
      padding:50px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      color:white;
      box-shadow:0 20px 40px rgba(0,0,0,.4);
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:25px;
      margin:auto;
      margin-bottom:25px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      background:linear-gradient(135deg,#2563eb,#10b981);
    }

    h1{
      text-align:center;
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:30px;
      line-height:1.7;
    }

    label{
      display:block;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:18px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:15px;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:18px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.25s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .error{
      margin-top:15px;
      color:#f87171;
      text-align:center;
      display:none;
    }
    /* HIỆU ỨNG NỀN */

.bg-animation span{
  position:absolute;
  bottom:-150px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  animation:float 15s linear infinite;
}

.bg-animation span:nth-child(1){
  width:80px;
  height:80px;
  left:10%;
  animation-duration:10s;
}

.bg-animation span:nth-child(2){
  width:120px;
  height:120px;
  left:30%;
  animation-duration:14s;
}

.bg-animation span:nth-child(3){
  width:60px;
  height:60px;
  left:50%;
  animation-duration:9s;
}

.bg-animation span:nth-child(4){
  width:150px;
  height:150px;
  left:70%;
  animation-duration:18s;
}

.bg-animation span:nth-child(5){
  width:90px;
  height:90px;
  left:90%;
  animation-duration:13s;
}

@keyframes float{

  0%{
    transform:translateY(0) rotate(0deg);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:translateY(-120vh) rotate(360deg);
    opacity:0;
  }

}
  </style>
</head>
<body>
  <div class="bg-animation">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

  <div class="card">

    <div class="logo">
      🎓
    </div>

    <h1>Thi Online</h1>

    <p>
      Nhập đúng mã dự thi được cấp để bắt đầu làm bài.
    </p>

    <label>Mã dự thi</label>

    <input type="text" id="examCode" placeholder="Nhập mã dự thi">

    <button onclick="startExam()">
      BẮT ĐẦU
    </button>

    <div class="error" id="error">
      Mã dự thi không hợp lệ!
    </div>

  </div>

  <script>

    // DANH SÁCH THÍ SINH

    const students = {

      "HS001":{
        name:"Ngô Đa Hiếu"
        exam:"0304"
      },

      "HS002":{
        name:"Trần Minh Hiếu"
        exam:"0302"
      },

      "HS003":{
        name:"Lê Gia Hân"
        exam:"0301"
      }
    };



    function startExam(){

  let code = document
  .getElementById('examCode')
  .value
  .trim()
  .toUpperCase();

  // KIỂM TRA MÃ

  if(students[code]){

    // LƯU MÃ

    localStorage.setItem(
      'examCode',
      code
    );

    // LƯU TÊN THÍ SINH

    localStorage.setItem(
      'studentName',
      students[code].name
    );

    localStorage.setItem(
    'examID',
    students[code].exam
  );

    // CHUYỂN TRANG

    window.location.href='info.html';

  }else{

    alert('Mã dự thi không hợp lệ!');

  }

}

  </script>

</body>
</html>
