<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thi Online</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
      radial-gradient(circle at top left,#2563eb55,transparent 30%),
      radial-gradient(circle at bottom right,#10b98155,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#111827);
    }

    .card{
      width:100%;
      max-width:520px;
      padding:50px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      color:white;
      box-shadow:0 20px 40px rgba(0,0,0,.4);
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:25px;
      margin:auto;
      margin-bottom:25px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      background:linear-gradient(135deg,#2563eb,#10b981);
    }

    h1{
      text-align:center;
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:30px;
      line-height:1.7;
    }

    label{
      display:block;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:18px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:15px;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:18px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.25s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .error{
      margin-top:15px;
      color:#f87171;
      text-align:center;
      display:none;
    }

  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      🎓
    </div>

    <h1>Thi Online</h1>

    <p>
      Nhập đúng mã dự thi được cấp để bắt đầu làm bài.
    </p>

    <label>Mã dự thi</label>

    <input type="text" id="examCode" placeholder="Nhập mã dự thi">

    <button onclick="startExam()">
      BẮT ĐẦU
    </button>

    <div class="error" id="error">
      Mã dự thi không hợp lệ!
    </div>

  </div>

  <script>

    // DANH SÁCH THÍ SINH

    const students = {

      "HS001":{
        name:"Ngô Đa Hiếu"
      },

      "HS002":{
        name:"Trần Minh Hiếu"
      },

      "HS003":{
        name:"Lê Gia Hân"
      }
    };



    function startExam(){

  let code = document
  .getElementById('examCode')
  .value
  .trim()
  .toUpperCase();

  // DANH SÁCH THÍ SINH

  const students = {

    "HS001":{
      name:"Ngô Đa Hiếu"
    },

    "HS002":{
      name:"Trần Minh Hiếu"
    },

    "HS003":{
      name:"Lê Gia Hân"
    },

    "HS004":{
      name:"Phạm Quốc Bảo"
    }

  };

  // KIỂM TRA MÃ

  if(students[code]){

    // LƯU MÃ

    localStorage.setItem(
      'examCode',
      code
    );

    // LƯU TÊN THÍ SINH

    localStorage.setItem(
      'studentName',
      students[code].name
    );

    // CHUYỂN TRANG

    window.location.href='info.html';

  }else{

    alert('Mã dự thi không hợp lệ!');

  }

}

  </script>

</body>
</html>
