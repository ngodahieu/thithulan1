<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hệ Thống Thi Online</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      radial-gradient(circle at top left,#2563eb55,transparent 30%),
      radial-gradient(circle at bottom right,#10b98155,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#111827);
      position:relative;
    }

    /* BACKGROUND */

    .bg-animation span{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.05);
      animation:float 12s linear infinite;
      bottom:-150px;
    }

    .bg-animation span:nth-child(1){
      width:80px;
      height:80px;
      left:10%;
      animation-duration:10s;
    }

    .bg-animation span:nth-child(2){
      width:120px;
      height:120px;
      left:30%;
      animation-duration:14s;
    }

    .bg-animation span:nth-child(3){
      width:60px;
      height:60px;
      left:50%;
      animation-duration:9s;
    }

    .bg-animation span:nth-child(4){
      width:150px;
      height:150px;
      left:70%;
      animation-duration:18s;
    }

    .bg-animation span:nth-child(5){
      width:90px;
      height:90px;
      left:90%;
      animation-duration:13s;
    }

    @keyframes float{
      0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
      }

      10%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
      }
    }

    /* CARD */

    .card{
      width:100%;
      max-width:520px;
      padding:50px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      box-shadow:
      0 25px 50px rgba(0,0,0,0.4),
      inset 0 0 20px rgba(255,255,255,0.05);
      position:relative;
      z-index:10;
      animation:show .6s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:translateY(25px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:90px;
      height:90px;
      margin:auto;
      margin-bottom:25px;
      border-radius:25px;
      background:linear-gradient(135deg,#2563eb,#10b981);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      box-shadow:0 10px 30px rgba(37,99,235,.5);
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:12px;
      font-weight:800;
      color:white;
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:35px;
    }

    .input-group{
      margin-bottom:25px;
    }

    .input-group label{
      display:block;
      margin-bottom:10px;
      color:#e2e8f0;
      font-size:15px;
    }

    input{
      width:100%;
      padding:18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.08);
      color:white;
      outline:none;
      font-size:15px;
      transition:.25s;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:#3b82f6;
      background:rgba(255,255,255,0.12);
      box-shadow:0 0 15px rgba(59,130,246,.4);
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
      letter-spacing:.5px;
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 25px rgba(37,99,235,.5);
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#94a3b8;
      font-size:14px;
    }

    @media(max-width:600px){

      .card{
        padding:35px 25px;
      }

      h1{
        font-size:32px;
      }

    }

  </style>
</head>
<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- CARD -->

  <div class="card">

    <div class="logo">
      🎓
    </div>

    <h1>Thi Online</h1>

    <p class="subtitle">
      Hệ thống làm bài kiểm tra trực tuyến dành cho học sinh.
      Nhập mã dự thi để bắt đầu.
    </p>

    <div class="input-group">

      <label>Mã dự thi</label>

      <input type="text" id="examCode" placeholder="Ví dụ: KT12-2026">

    </div>

    <button onclick="startExam()">
      BẮT ĐẦU LÀM BÀI
    </button>

    <div class="footer">
      Hệ thống kiểm tra trực tuyến
    </div>

  </div>

  <script>

    function startExam(){

      let code=document.getElementById('examCode').value;

      if(code.trim()===''){
        alert('Vui lòng nhập mã dự thi');
        return;
      }

      localStorage.setItem('examCode',code);

      window.location.href='info.html';
    }

  </script>

</body>
</html>
