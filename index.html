<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trang Chủ</title>

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
      overflow:hidden;
      padding:20px;
    }

    .background{
      position:absolute;
      inset:0;
    }

    .circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.5;
    }

    .circle1{
      width:350px;
      height:350px;
      background:#2563eb;
      top:-100px;
      left:-100px;
    }

    .circle2{
      width:300px;
      height:300px;
      background:#10b981;
      bottom:-100px;
      right:-100px;
    }

    .card{
      position:relative;
      z-index:10;
      width:100%;
      max-width:500px;
      padding:45px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
      box-shadow:0 25px 50px rgba(0,0,0,0.4);
      color:white;
      animation:show .5s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:38px;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:25px;
    }

    .input-box{
      margin-top:20px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:15px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:15px;
      transition:.25s;
    }

    input:focus{
      background:rgba(255,255,255,0.12);
      border:1px solid #3b82f6;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:.25s;
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 20px rgba(37,99,235,.4);
    }

  </style>
</head>
<body>

  <div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
  </div>

  <div class="card">

    <h1>Hệ Thống Thi</h1>

    <p>
      Nhập mã dự thi để bắt đầu làm bài kiểm tra trực tuyến.
    </p>

    <div class="input-box">
      <label>Mã dự thi</label>

      <input type="text" id="examCode" placeholder="Ví dụ: KT12-2026">
    </div>

    <button onclick="startExam()">
      Bắt Đầu
    </button>

  </div>

  <script>

    function startExam(){

      let code=document.getElementById('examCode').value;

      if(code.trim()===''){
        alert('Vui lòng nhập mã dự thi');
        return;
      }

      localStorage.setItem('examCode',code);

      window.location.href='info.html';
    }

  </script>

</body>
</html>
