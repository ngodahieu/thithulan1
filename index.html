<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Chủ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:white;
    }

    .box{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:30px;
      padding:40px;
      backdrop-filter:blur(12px);
    }

    h1{
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
    }

    input{
      width:100%;
      padding:15px;
      margin-top:20px;
      border:none;
      border-radius:15px;
      background:rgba(255,255,255,0.08);
      color:white;
      outline:none;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      border:none;
      border-radius:15px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }

    button:hover{
      background:#3b82f6;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Hệ Thống Làm Bài Thi</h1>

    <p>
      Nhập mã dự thi để bắt đầu làm bài.
    </p>

</html>
